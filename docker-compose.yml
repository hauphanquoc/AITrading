version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aitrading-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aitrading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aitrading-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aitrading
      JWT_SECRET: your-jwt-secret-change-in-production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MT5_API_URL: http://mt5-api:8000
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  mt5-api:
    build:
      context: ./mt5-api
      dockerfile: Dockerfile
    container_name: aitrading-mt5
    environment:
      USE_MOCK_DATA: "true"
      PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres_data:
